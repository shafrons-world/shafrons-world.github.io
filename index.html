<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shafron's World</title>
    <meta
      name="description"
      content="Essays, education, and explanation on Americanicity, Catholicity, and related themes."
    >
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --muted: #5f6368;
        --paper: #fbfaf7;
        --rule: #d6d2c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--paper);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(100%, 760px);
      }

      h1 {
        margin: 0 0 20px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--rule);
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 1;
        font-weight: 400;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: 1.25rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shafron's World</h1>
      <p>Essays, education, and explanation on Americanicity, Catholicity, and related themes. This site is being built from the ground up.</p>
    </main>
  </body>
</html>
